name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # Required for npm provenance with OIDC
      pull-requests: write # Required so the bot can open the PR

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24.13.1
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # This step evaluates whether to open a PR or publish
      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          # Custom versioning script:
          # It requires running `pnpm install` AFTER changesets updates the versions
          # in the package.json files, so the `pnpm-lock.yaml` is correctly updated in the PR.
          version: pnpm run version # assumes a script in package.json: "version": "changeset version && pnpm install --no-frozen-lockfile"

          # Command to publish the packages
          publish: pnpm exec changeset publish

          commit: '[ci] release'
          title: '[ci] release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Forces the use of OIDC/Provenance instead of the classic token
          NPM_TOKEN: '' # https://github.com/changesets/changesets/issues/1152#issuecomment-3190884868

      - name: Generate Changelog with Changelogithub
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo '${{ steps.changesets.outputs.publishedPackages }}' \
            | jq -r '.[] | "\(.name)@\(.version)"' \
            | while read new_tag; do
                pkg_name=$(echo "$new_tag" | sed 's/@[^@]*$//')
                version=$(echo "$new_tag" | sed 's/.*@//')

                # Detects the new tag channel
                if echo "$version" | grep -q '\-alpha'; then
                  channel="alpha"
                elif echo "$version" | grep -q '\-beta'; then
                  channel="beta"
                else
                  channel="stable"
                fi

                # Filter tags by channel
                if [ "$channel" = "stable" ]; then
                  filter_cmd="grep -v '\-alpha\|\-beta'"
                elif [ "$channel" = "alpha" ]; then
                  filter_cmd="grep '\-alpha'"
                else
                  filter_cmd="grep '\-beta'"
                fi

                prev_tag=$(git tag \
                  | grep "^${pkg_name}@" \
                  | sed "s|^${pkg_name}@||" \
                  | eval "$filter_cmd" \
                  | sort -rV \
                  | sed -n '2p' \
                  | xargs -I{} echo "${pkg_name}@{}")

                echo "Changelog for $new_tag | channel: $channel (from: ${prev_tag:-'initial release'})"

                draft_flag=""
                [ "$channel" != "stable" ] && draft_flag="--draft"

                if [ -n "$prev_tag" ]; then
                  pnpx changelogithub --from "$prev_tag" --to "$new_tag" $draft_flag || true
                else
                  pnpx changelogithub --to "$new_tag" $draft_flag || true
                fi
              done

      # If the previous step published something (i.e. you merged the PR), we generate the GitHub release
      # - name: Generate Changelog with Changelogithub
      #  if: steps.changesets.outputs.published == 'true'
      #  run: pnpx changelogithub
      #  env:
      #    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
